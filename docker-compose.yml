services:
  mongodb:
    image: mongo:8
    container_name: dependency-explorer-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: dependency-explorer
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
